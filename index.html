<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حاسبة المقذوفات - هندسة ميكانيكية</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; }
        .card { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .results { margin-top: 20px; text-align: right; background: #eef2f3; padding: 15px; border-radius: 5px; }
        h2 { color: #333; }
        p { margin: 5px 0; font-weight: bold; }
        span { color: #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h2>حاسبة المقذوفات</h2>
    
    <label>السرعة الابتدائية (v₀) م/ث:</label>
    <input type="number" id="velocity" placeholder="أدخل السرعة مثل 100" oninput="calculate()">
    
    <label>الزاوية (θ) بالدرجات:</label>
    <input type="number" id="angle" placeholder="أدخل الزاوية" oninput="calculate()">

    <div class="results">
        <p>زمن التحليق (tₐ): <span id="ta">-</span> ثانية</p>
        <p>أقصى ارتفاع (hₘₐₓ): <span id="hmax">-</span> متر</p>
        <p>أقصى مدى (Rₘₐₓ): <span id="rmax">-</span> متر</p>
    </div>
</div>

<script>
function calculate() {
    // جلب القيم من الخانات
    const v0 = parseFloat(document.getElementById('velocity').value);
    const degree = parseFloat(document.getElementById('angle').value);
    const g = 9.81;

    if (v0 && degree) {
        // تحويل الزاوية من درجات إلى راديان لأن JavaScript تتعامل بالراديان
        const theta = degree * (Math.PI / 180);

        // 1. حساب زمن التحليق الكلي ta
        const ta = (2 * v0 * Math.sin(theta)) / g;

        // 2. حساب أقصى ارتفاع hmax
        const hmax = (Math.pow(v0, 2) * Math.pow(Math.sin(theta), 2)) / (2 * g);

        // 3. حساب المدى الأفقي Rmax
        const rmax = (Math.pow(v0, 2) * Math.sin(2 * theta)) / g;

        // عرض النتائج وتقريبها لمرتبتين عشريتين
        document.getElementById('ta').innerText = ta.toFixed(2);
        document.getElementById('hmax').innerText = hmax.toFixed(2);
        document.getElementById('rmax').innerText = rmax.toFixed(2);
    } else {
        // تصفير النتائج إذا كانت الخانات فارغة
        document.getElementById('ta').innerText = "-";
        document.getElementById('hmax').innerText = "-";
        document.getElementById('rmax').innerText = "-";
    }
}
</script>

</body>
</html>
